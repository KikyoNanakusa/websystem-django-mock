{% extends 'base.html' %}
{% load static %}

{% block title %}ホームページ{% endblock %}

{% block content %}
<header>
    <h1>商品カテゴリへようこそ！</h1>
    <p>カテゴリを選択して、レビューを見たり投稿したりしましょう。</p>

    <!-- 概要ページへのリンク -->
    <a href="{% url 'about' %}" class="btn">概要ページはコチラです</a>
</header>

<div class="container">
    <h2>カテゴリ一覧</h2>
    <ul>
        {% for category in categories %}
        <li>
            <a href="{% url 'category_products' category.id %}">{{ category.name }}</a>
        </li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
