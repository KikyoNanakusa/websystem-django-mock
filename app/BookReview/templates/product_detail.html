<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ product.name }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
        }
        header {
            background: #35424a;
            color: #ffffff;
            padding: 1rem 0;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: #ffffff;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        a {
            text-decoration: none;
            color: #35424a;
        }
    </style>
</head>
<body>
    <header>
        <h1>{{ product.name }}</h1>
    </header>
    <div class="container">
        <h2>{{ product.name }}</h2>
        <p><strong>Description:</strong> {{ product.description }}</p>
        <p><strong>Price:</strong> ${{ product.price }}</p>
        <p><strong>ISBN:</strong> {{ product.isbn }}</p>
        <p><strong>作成日:</strong> {{ product.created_at }}</p>
        <p><strong>更新日:</strong> {{ product.updated_at }}</p>
        <p><a href="{% url 'index' %}">← 戻る</a></p>
    </div>
</body>
</html>
