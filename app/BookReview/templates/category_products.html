{% extends 'base.html' %}

{% block title %}{{ category_key }} のカテゴリ商品一覧{% endblock %}

{% block content %}

<div class="container">
    <h1>{{ category_key }} の商品一覧</h1>
    <ul>
        {% for product in products %}
        <li>
            <a href="{% url 'product_detail' product.id %}">{{ product.name }}</a> - ¥{{ product.price }}
        </li>
        {% empty %}
        <li>このカテゴリには商品がありません。</li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
