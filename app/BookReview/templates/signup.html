{% extends 'base.html' %}

{% block title %}ユーザー登録{% endblock %}

{% block content %}
<div class="signup-container">
    <h1>ユーザー登録</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">登録</button>
    </form>
    {% for message in messages %}
        <p style="color: red;">{{ message }}</p>
    {% endfor %}
    <p>すでにアカウントをお持ちですか？ <a href="{% url 'login' %}">ログイン</a></p>
</div>
{% endblock %}
