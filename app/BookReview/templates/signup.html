{% extends 'base.html' %}
{% load static %}

{% block title %}ユーザー登録{% endblock %}

{% block extra_head %}
    <link rel="stylesheet" href="{% static 'style/signup.css' %}">
{% endblock %}

{% block content %}
<div class="signup-container">
    <h1>ユーザー登録</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="signup-button">登録</button>
    </form>

    {% for message in messages %}
        <p class="error-message">{{ message }}</p>
    {% endfor %}

    <p class="login-link">
        すでにアカウントをお持ちですか？ <a href="{% url 'login' %}">ログイン</a>
    </p>
</div>
{% endblock %}
