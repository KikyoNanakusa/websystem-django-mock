{% load static %}
<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TYUTAYA{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'style/global.css' %}">
    {% block extra_head %}{% endblock %}
</head>

<body>
    <!-- ヘッダー -->
    <header>
        <div class="container">
            <div class="logo">
                <a href="{% url 'index' %}">TYUTAYA</a>
            </div>
            <nav aria-label="メインナビゲーション">
                <ul class="nav-links">
                    <li><a href="{% url 'index' %}">ホーム</a></li>
                    <li><a href="{% url 'about' %}">概要</a></li>
                    <li><a href="{% url 'contact' %}">お問い合わせ</a></li>
                    <li>
                        <div class="auth-button">
                            {% if user.is_authenticated %}
                            <a href="{% url 'logout' %}" class="button">ログアウト</a>
                            {% else %}
                            <a href="{% url 'login' %}" class="button">ログイン</a>
                            {% endif %}
                        </div>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="main_container">
        {% block content %}
        {% endblock %}
    </main>

    <!-- フッター -->
    <footer>
        <div>
            <p>&copy; 2025 TYUTAYA Inc.</p>
        </div>
    </footer>
</body>

</html>
