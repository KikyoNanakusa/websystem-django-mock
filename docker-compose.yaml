version: "3.9"

services:
  web:
    build: 
      context: .
      dockerfile: app/Dockerfile
    container_name: django_web
    command: bash -c "python manage.py makemigrations BookReview && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    # command: bash -c "python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./app:/app
    working_dir: /app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: postgres_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    ports:
      - "5432:5432"

volumes:
  postgres_data:
